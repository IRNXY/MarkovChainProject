<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор текста на основе цепей Маркова</title>
    <link rel="stylesheet" href="../styles/index.css">
</head>
<body>

<div class="container" id="containerMain">
    <div class="header-row">
        <h2>Генератор текста на основе цепей Маркова</h2>
        <button id="themeBtn">Сменить тему</button>
    </div>
    
    <div id="output" class="output">Результат появится здесь...</div>

    <div class="field">
        <label>Количество слов в n-грамме:</label>
        <select id="ngram">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>
    </div>

    <div class="field">
        <label>Всего слов в тексте:</label>
        <input type="number" id="totalWords" value="50">
    </div>

    <div class="field">
        <label>Загрузить файл для обучения:</label>
        <input type="file" id="fileInput">
    </div>

    <button id="sendBtn">Сгенерировать</button>
</div>

<script src="../js/index.js"></script>
</body>
</html>
